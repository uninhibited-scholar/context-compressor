name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token needed.
# Triggers when you push a version tag like `v0.2.0`.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the one configured as a Trusted Publisher
    # on PyPI (Project → Publishing → GitHub).
    environment:
      name: pypi
      url: https://pypi.org/p/context-compressor
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
